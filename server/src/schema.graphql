type Form {
  id: ID!
  title: String!
  description: String
  questions: [Question!]!
}

type Question {
  id: ID!
  text: String!
  type: QuestionType!
  required: Boolean!
  options: [String!]!
}

enum QuestionType {
  TEXT
  MULTIPLE_CHOICE
  CHECKBOX
  DATE
}

type Response {
  id: ID!
  formId: ID!
  form: Form!
  answers: [Answer]!
}

type Answer {
  questionId: ID!
  question: Question!
  value: String
}

input QuestionInput {
  text: String!
  type: QuestionType!
  required: Boolean
  options: [String!]
}

input AnswerInput {
  questionId: ID!
  value: String
}

type Query {
  forms: [Form!]
  form(id: ID!): Form
  responses(formId: ID!): [Response!]
}

type Mutation {
  createForm(
    title: String!
    description: String
    questions: [QuestionInput]
  ): Form!

  submitResponse(formId: ID!, answers: [AnswerInput]!): Response!
}
